name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build project
        run: npm run build

      # ✅ Upload to temp folder (IMPORTANT)
      - name: 🚀 Upload to EC2 (temp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "dist/*"
          target: "/home/ubuntu/temp-dist"

      # ✅ Move + Fix permissions
      - name: 🔄 Deploy on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Remove old dist
            sudo rm -rf /home/ubuntu/Activ-Line--frontend/dist

            # Move new build
            sudo mv /home/ubuntu/temp-dist/dist /home/ubuntu/Activ-Line--frontend/

            # Fix permissions for nginx
            sudo chown -R www-data:www-data /home/ubuntu/Activ-Line--frontend/dist
            sudo chmod -R 755 /home/ubuntu/Activ-Line--frontend/dist

            # Restart nginx
            sudo systemctl restart nginx
